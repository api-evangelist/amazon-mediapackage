naftiko: 1.0.0-alpha1
info:
  label: Amazon MediaPackage Workflow
  description: Workflow capability for Amazon MediaPackage media processing operations for broadcast engineers and media developers.
  tags:
  - AWS
  - Media
  - Broadcasting
  - Workflow
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: mediapackage
    location: ./shared/mediapackage.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: mediapackage-workflow-api
    description: Unified REST API for Amazon MediaPackage workflow management.
    resources:
    - path: /v1/jobs
      name: jobs
      description: Manage media processing jobs
      operations:
      - method: GET
        name: list-jobs
        description: List jobs
        call: mediapackage.list-jobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mediapackage-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon MediaPackage workflow management.
    tools:
    - name: configure-logs
      description: ConfigureLogs
      hints:
        readOnly: false
        openWorld: true
      call: mediapackage.configure-logs
      outputParameters:
      - type: object
        mapping: $.
    - name: list-channels
      description: ListChannels
      hints:
        readOnly: true
        openWorld: true
      call: mediapackage.list-channels
      outputParameters:
      - type: object
        mapping: $.
    - name: create-channel
      description: CreateChannel
      hints:
        readOnly: false
        openWorld: true
      call: mediapackage.create-channel
      outputParameters:
      - type: object
        mapping: $.
    - name: list-harvest-jobs
      description: ListHarvestJobs
      hints:
        readOnly: true
        openWorld: true
      call: mediapackage.list-harvest-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-harvest-job
      description: CreateHarvestJob
      hints:
        readOnly: false
        openWorld: true
      call: mediapackage.create-harvest-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-origin-endpoints
      description: ListOriginEndpoints
      hints:
        readOnly: true
        openWorld: true
      call: mediapackage.list-origin-endpoints
      outputParameters:
      - type: object
        mapping: $.
    - name: create-origin-endpoint
      description: CreateOriginEndpoint
      hints:
        readOnly: false
        openWorld: true
      call: mediapackage.create-origin-endpoint
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-channel
      description: DescribeChannel
      hints:
        readOnly: true
        openWorld: true
      call: mediapackage.describe-channel
      outputParameters:
      - type: object
        mapping: $.
